{% extends "../base.html" %}

{% block content %}
</br />
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% load static %}

<script src="{% static 'js/cancel_booking.js' %}"></script>
<style>
  .code-box {
    width: 50px;
    height: 50px;
    font-size: 24px;
    text-transform: uppercase;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  .code-box:focus {
    border-color: #007bff;
    outline: none;
    box-shadow: 0 0 5px rgba(0, 123, 255, .5);
  }
</style>
</br />
<div class="row">
  <div class="col">
    <div class="card border-primary mb-3">
      <div class="card-header">Avboka bokning</div>
      <div class="card-body">
        <p class="card-text">Skriv in din bokningskod för att avboka.</p>
        <div class="row">
          <div class="container mt-4">
            <div id="code-input" class="d-flex gap-2">
              <!-- Boxes will be created dynamically -->
            </div>
          </div>
        </div>
      </br />
      <!-- Hidden input for full code -->
      <input type="hidden" id="full-code" name="full_code" />
      <div class="row">
        <label for="cancel_password" class="form-label mt-4">Skriv in koden från svenska lag.</label>
        <div class="col-sm-4">
          <input class="form-control form-control-lg"
                 id="cancel_password"
                 name="auth_password"
                 placeholder="Svenskalag koden" />
        </div>
      </div>
      <!-- Submit button -->
      <button type="submit"
              id="submit-btn"
              class="btn btn-primary mt-3"
              hx-post="do_cancel_booking/"
              hx-trigger="click"
              hx-target="#cancel-booking-alert-placeholder"
              hx-include="[id='full-code'], [id='cancel_password']"
              disabled>Avboka</button>
      <div id="cancel-booking-alert-placeholder">
        <!-- This content will be replaced by the response from your Django view -->
      </div>
    </div>
    <!-- END CARD BODY -->
  </div>
  <!-- END CARD -->
</div>
<!-- COL -->
</div>
<!-- ROW -->
{% endblock content %}
