volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_traefik: {}
  production_django_media: {}



services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile

    image: surf_shed_production_django
    volumes:
      - production_django_media:/app/surf_shed/media
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    command: /start
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`64.226.71.127`)"
    deploy:
      resources:
        limits:
          cpus: '0.5'   # 50% of 1 vCPU
          memory: 200M  # 400MB RAM limit
        reservations:
          cpus: '0.25'  # Guarantees 25% of CPU
          memory: 100M  # Guarantees 200MB RAM

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: surf_shed_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres

  traefik:
    build:
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
    image: surf_shed_production_traefik
    depends_on:
      - django
    volumes:
      - production_traefik:/etc/traefik/acme
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:8080:8080'
      - '0.0.0.0:5000:5000'
      - '0.0.0.0:443:443'

    deploy:
      resources:
        limits:
          cpus: '0.1'   # 50% of 1 vCPU
          memory: 100M  # 400MB RAM limit
        reservations:
          cpus: '0.25'  # Guarantees 25% of CPU
          memory: 50M  # Guarantees 200MB RAM

  redis:
    image: docker.io/redis:6


  nginx:
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
    image: surf_shed_production_nginx
    depends_on:
      - django
    volumes:
      - production_django_media:/usr/share/nginx/media:ro
